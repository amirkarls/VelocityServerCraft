# Основные настройки сети
bind = "0.0.0.0:25565"
motd = "<#ff6600>🐉 Dragons Power Network"
show-max-players = 500
online-mode = false

# Режим передачи IP-адресов игроков на сервер
player-info-forwarding-mode = "modern"
forwarding-secret-file = "forwarding.secret"

# Список твоих игровых серверов (укажи реальные адреса и порты из панели Falix)
[servers]
# Сервер авторизации (куда игрок попадает первым делом)
auth = "falix-ip-адрес-тут:порт"
# Хаб (куда игрок попадает после авторизации)
hub = "falix-ip-адрес-тут:порт"
# Твой гриф сервер
grief = "falix-ip-адрес-тут:порт"

# Сервер по умолчанию (здесь должен быть твой сервер с капчей/регистрацией)
try = ["auth"]

# Принудительные домены (можешь удалить эту секцию, если у тебя нет домена)
[forced-hosts]
"localhost" = ["hub"]
